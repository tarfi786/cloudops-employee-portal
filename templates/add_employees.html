{% extends "base.html" %}

{% block title %}Add Employee | CloudOps Employee Portal{% endblock %}

{% block content %}

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-lg-2 sidebar text-white p-4">

            <h3 class="logo text-center mb-5">
                ☁ CloudOps
            </h3>

            <ul class="nav flex-column">

                <li class="nav-item mb-2">
                    <a href="/dashboard" class="nav-link">
                        <i class="bi bi-speedometer2 me-2"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a href="/employees" class="nav-link">
                        <i class="bi bi-people-fill me-2"></i>
                        Employees
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a href="/add-employee" class="nav-link active">
                        <i class="bi bi-person-plus-fill me-2"></i>
                        Add Employee
                    </a>
                </li>

                <li class="nav-item mt-4">
                    <a href="/" class="nav-link text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->
        <div class="col-lg-10 p-4">

            <div class="topbar mb-4">
                <h2>Add New Employee</h2>
                <p class="text-muted mb-0">
                    Fill in the employee details below.
                </p>
            </div>

            <div class="card-box">

                <form>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter full name">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter email address">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" class="form-control" placeholder="Enter phone number">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select">
                                <option>DevOps</option>
                                <option>HR</option>
                                <option>Finance</option>
                                <option>Marketing</option>
                                <option>Operations</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Role</label>
                            <input type="text" class="form-control" placeholder="Enter job role">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary</label>
                            <input type="number" class="form-control" placeholder="Enter salary">
                        </div>

                        <div class="col-12 mb-4">
                            <label class="form-label">Profile Photo</label>
                            <input type="file" class="form-control">
                        </div>

                    </div>

                    <button class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>
                        Save Employee
                    </button>

                    <a href="/employees" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
